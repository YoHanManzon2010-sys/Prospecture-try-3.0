<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literature Quiz</title>

<style>
:root{
--bg:linear-gradient(-45deg,#dfe9f3,#ffffff,#e3f2fd,#ffffff);
--paper:#fffef8;
--text:#222;
--hover:#f2f2f2;
--selected:#d6e4ff;
--btn:#4a6fa5;
--btn-text:#fff;
}

body.dark{
--bg:linear-gradient(-45deg,#1e1e1e,#2c2c2c,#1a1a1a,#2c2c2c);
--paper:#2f2f2f;
--text:#f5f5f5;
--hover:#3c3c3c;
--selected:#3a5a8f;
--btn:#6c8cd5;
--btn-text:#ffffff;
}

body{
margin:0;
font-family:"Times New Roman",serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(-45deg,#ffecd2,#fcb69f,#a1c4fd,#c2e9fb);
background-size: 400% 400%;
animation: gradientBGbody 20s ease infinite;
overflow-y: auto;
overflow-x: hidden;
}

@keyframes gradientBGbody{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.paper{
width:820px;
background: var(--bg);
background-size: 400% 400%;
animation: gradientBG 12s ease infinite;
padding:40px 50px;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,0.35), inset 0 0 30px rgba(255,255,255,0.1);
color:var(--text);
transition:.3s;
position:relative;
overflow-y: auto;
max-height:90vh;
z-index:1;
}

.paper::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
  border-radius:20px;
}

.progress {
  height:10px;
  background:#eee;
  border-radius:5px;
  overflow:hidden;
  margin-bottom:20px;
}
.progress-fill {
  width:0%;
  height:100%;
  background: linear-gradient(to right, #4a6fa5, #6c8cd5);
  transition:width 0.4s;
}

.slide {
  display:none;
  opacity:0;
  transform: translateY(20px);
  transition: all 0.5s ease;
}
.slide.active {
  display:block;
  opacity:1;
  transform: translateY(0);
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:10px 20px;
border:2px solid rgba(74, 111, 165, 0.5);
border-radius:25px;
cursor:pointer;
background: transparent;
color:rgba(74, 111, 165, 0.9);
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition: all 0.3s;
}

button:hover{
transform: scale(1.05);
opacity:0.9;
}

.question{
margin-bottom:18px;
padding-bottom:8px;
border-bottom:1px solid rgba(0,0,0,0.1);
}

.options label{
display:block;
padding:10px 15px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
transition: all 0.3s;
border:1px solid rgba(0,0,0,0.1);
}

.options label:hover{
background:var(--hover);
transform:scale(1.03);
}

.options input:checked + span{
background:var(--selected);
padding:6px 10px;
border-radius:6px;
border:1px solid #3a5a8f;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#result{
text-align:center;
font-size:20px;
}

#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="paper">
<div class="top-bar">
<button onclick="goBack()">⬅ Back</button>
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<h1 style="text-align:center;">Literature Quiz</h1>

<div class="progress">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div id="quizSlides"></div>
<div id="result"></div>
</div>

<script>
// Literature Quiz Questions (20)
const questionBank = [
{q:"Who wrote 'Noli Me Tangere'?",o:["Juan Luna","Jose Rizal","Nick Joaquin","Lualhati Bautista"],a:1},
{q:"Who is the protagonist of 'The Great Gatsby'?",o:["Tom Buchanan","Jay Gatsby","Nick Carraway","Daisy Buchanan"],a:1},
{q:"Which literary device is used in 'The wind whispered through the trees'?",o:["Metaphor","Simile","Personification","Alliteration"],a:2},
{q:"Who wrote 'Romeo and Juliet'?",o:["William Shakespeare","Jane Austen","Mark Twain","Charles Dickens"],a:0},
{q:"What is the central theme of 'To Kill a Mockingbird'?",o:["Racism and Justice","Adventure","Love","Revenge"],a:0},
{q:"Which poem is written by Jose Garcia Villa?",o:["Footnote to Youth","Have Come, Am Here","The Moonlight","Florante at Laura"],a:1},
{q:"Who wrote 'Pride and Prejudice'?",o:["Emily Brontë","Jane Austen","Charles Dickens","Virginia Woolf"],a:1},
{q:"Which novel begins with 'Call me Ishmael'?",o:["Moby-Dick","Treasure Island","The Odyssey","The Old Man and the Sea"],a:0},
{q:"Which literary period does Edgar Allan Poe belong to?",o:["Romanticism","Modernism","Realism","Renaissance"],a:0},
{q:"Who is the author of 'Wuthering Heights'?",o:["Emily Brontë","Charlotte Brontë","Jane Austen","Mary Shelley"],a:0},
{q:"Who wrote 'May Day Eve'?",o:["Nick Joaquin","José Rizal","Edgar Allan Poe","F. Sionil Jose"],a:0},
{q:"What is a common theme in Philippine literature?",o:["Colonialism and Identity","Space Travel","Magic","Detective Mystery"],a:0},
{q:"Who is the author of 'Florante at Laura'?",o:["Francisco Balagtas","José Rizal","Nick Joaquin","Emilio Jacinto"],a:0},
{q:"What literary device is 'O Romeo, Romeo! Wherefore art thou Romeo?'",o:["Alliteration","Personification","Apostrophe","Simile"],a:2},
{q:"Which is a symbol in 'The Great Gatsby'?",o:["The Green Light","The Clock","The Apple","The River"],a:0},
{q:"Which narrative perspective uses 'I'?",o:["First-person","Third-person","Second-person","Omniscient"],a:0},
{q:"Who wrote 'Macbeth'?",o:["William Shakespeare","Christopher Marlowe","Ben Jonson","John Milton"],a:0},
{q:"Which type of poem is 'The Raven' by Edgar Allan Poe?",o:["Sonnet","Epic","Narrative","Lyric"],a:2},
{q:"Which novel features Piggy, Ralph, and Jack?",o:["Lord of the Flies","Treasure Island","Animal Farm","Oliver Twist"],a:0},
{q:"Who is the protagonist in 'Noli Me Tangere'?",o:["Crisostomo Ibarra","Elias","Maria Clara","Padre Damaso"],a:0}
];

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
shuffle(questionBank);
const selectedQuestions = questionBank.slice(0,20);

const slidesContainer=document.getElementById("quizSlides");
let currentSlide=0;
let score=0;

for(let i=0;i<4;i++){
let slide=document.createElement("div");
slide.classList.add("slide");
if(i===0) slide.classList.add("active");
let slice=selectedQuestions.slice(i*5,(i+1)*5);
slice.forEach((item,index)=>{
slide.innerHTML+=`
<div class="question">
<p><strong>${i*5+index+1}. ${item.q}</strong></p>
<div class="options">
${item.o.map((opt,optIndex)=>`
<label>
<input type="radio" name="q${i*5+index}" value="${optIndex}">
<span>${opt}</span>
</label>
`).join("")}
</div>
</div>
`;
});
slidesContainer.appendChild(slide);
}

slidesContainer.addEventListener("change",function(){
let slide=document.querySelectorAll(".slide")[currentSlide];
let checked=slide.querySelectorAll("input[type=radio]:checked");
if(checked.length===5){setTimeout(()=>{nextSlide();},400);}
});

function nextSlide(){
let slides=document.querySelectorAll(".slide");
slides[currentSlide].classList.remove("active");
currentSlide++;
if(currentSlide<slides.length){
  slides[currentSlide].classList.add("active");
  document.querySelector(".paper").scrollTop = 0;
}else{calculateScore();}
document.getElementById("progressFill").style.width = ((currentSlide)/slides.length)*100 + "%";
}

function calculateScore(){
selectedQuestions.forEach((item,index)=>{
let selected=document.querySelector(`input[name="q${index}"]:checked`);
if(selected && parseInt(selected.value)===item.a){score++;}
});
let message="";
if(score<=9){message="Needs Improvement 📘";}
else if(score<=15){message="Good Job 👍";}
else{message="Excellent Work 🌟";}

document.getElementById("quizSlides").style.display="none";
document.getElementById("result").innerHTML=
`🎉 Quiz Finished! <br><br>
Your Score: <strong>${score}/20</strong><br><br>
Performance: <strong>${message}</strong><br><br>
<button onclick="goToNextQuiz()" style="padding:12px 25px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:25px;cursor:pointer;font-size:16px;font-weight:bold;margin-top:20px;">Back to Book ➜</button>`;
}

function goToNextQuiz(){
  window.location.href="language.html";
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
  const btn = document.querySelector('button[onclick="toggleDarkMode()"]');
  if(document.body.classList.contains("dark")){
    btn.textContent = "☀️ Light Mode";
  } else {
    btn.textContent = "🌙 Dark Mode";
  }
}
function goBack(){window.location.href="language.html";}

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for(let i=0;i<80;i++){
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
radius: Math.random()*2+1,
speedX: (Math.random()-0.5)*0.5,
speedY: (Math.random()-0.5)*0.5,
alpha: Math.random()*0.5+0.2
});
}

function drawParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let p of particles){
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
ctx.fill();
p.x+=p.speedX;p.y+=p.speedY;
if(p.x>canvas.width)p.x=0;
if(p.x<0)p.x=canvas.width;
if(p.y>canvas.height)p.y=0;
if(p.y<0)p.y=canvas.height;
}
requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
