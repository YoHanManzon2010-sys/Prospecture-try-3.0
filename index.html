<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Prospecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("Background.png") no-repeat center/cover fixed;
      text-align: center;
      overflow-x: hidden;
      overflow-y: hidden;
      padding: 1rem;
    }

    /* Canva-like Flow transition */
    body.flow-out .container {
      animation: flowOut 1s ease forwards;
    }

    @keyframes flowOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-80px);
      }
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(60, 0, 100, 0.4);
    }
    
   

    .container {
      font-family: "Fredoka", sans-serif;
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 900px;
      padding: clamp(0.5rem, 2vw, 1rem);
      text-align: center;
      margin: 0 auto;


      /* flow-in on load */
      opacity: 0;
      transform: translateY(50px);
      animation: flowIn 1s ease-out forwards;
    }

    @keyframes flowIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 800;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    h2 {
      margin-top: 0.5rem;
      font-size: clamp(1rem, 2.5vw, 1.8rem);
      font-weight: 500;
      color: #fff;
    }

    .buttons {
      margin-top: clamp(1.5rem, 5vw, 3rem);
      display: flex;
      flex-direction: column;
      gap: clamp(1rem, 3vw, 1.5rem);
      align-items: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      width: clamp(250px, 70%, 500px);
      padding: clamp(1rem, 2.5vw, 1.5rem);
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 600;
      border-radius: clamp(20px, 4vw, 25px);
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, #8a2be2, #00c3ff);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
    }

    .btn:active {
      transform: scale(0.98);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Mobile-specific adjustments */
    @media (max-width: 480px) {
      body {
        padding: 0.75rem;
      }
      
      .btn {
        width: 90%;
        padding: 1rem;
      }
    }

    /* Tablet and up */
    @media (min-width: 768px) {
      .buttons {
        flex-direction: row;
        justify-content: center;
      }
    }

    /* Hide cursor on touch devices */
    @media (hover: none) and (pointer: coarse) {
      .cursor,
      .cursor-ring {
        display: none;
      }
    }

  </style>

 
</head>
<body>
  
  <canvas id="particles"></canvas>
  <div class="cursor"></div>
<div class="cursor-ring"></div>

  <!-- Wires container -->
  <div class="wires">
    <div class="wire">
      <span class="data"></span>
      <span class="data"></span>
      <span class="data"></span>
       <span class="data"></span>
    </div>
    <div class="wire">
      <span class="data"></span>
      <span class="data"></span>
    </div>
    <div class="wire">
      <span class="data"></span>
    </div>
  </div>

  <div class="container">
    <h1>WELCOME<br>TO PROSPECTURE</h1>
    <h2>Uncertain Future Career</h2>
    <div class="buttons">
      <a href="Homepage.html" class="btn">Proceed</a>
    </div>
  </div>

   <script>
  const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// PARTICLE CLASS
class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.size = Math.random() * 2 + 1;
  }

  move() {
    this.x += this.vx;
    this.y += this.vy;

    // Bounce off edges
    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 2, Math.PI * 3);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
  }
}

// CREATE PARTICLES
const particles = [];
const COUNT = 180;
for (let i = 0; i < COUNT; i++) {
  particles.push(new Particle());
}

// DRAW LINES BETWEEN CLOSE PARTICLES
const LINK_DISTANCE = 150;
function connect() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < LINK_DISTANCE) {
        ctx.strokeStyle = `rgba(255,255,255,${1 - dist / LINK_DISTANCE})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }
}


  </script>
</body>
</html>
