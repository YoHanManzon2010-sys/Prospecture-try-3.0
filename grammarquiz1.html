<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Quiz</title>

<style>
:root{
--bg:linear-gradient(-45deg,#dfe9f3,#ffffff,#e3f2fd,#ffffff);
--paper:#fffef8;
--text:#222;
--hover:#f2f2f2;
--selected:#d6e4ff;
--btn:#4a6fa5;
--btn-text:#fff;
}

body.dark{
--bg:linear-gradient(-45deg,#1e1e1e,#2c2c2c,#1a1a1a,#2c2c2c);
--paper:#2f2f2f;
--text:#f5f5f5;
--hover:#3c3c3c;
--selected:#3a5a8f;
--btn:#6c8cd5;
--btn-text:#ffffff;
}

/* BODY WITH ANIMATED BACKGROUND */
body{
margin:0;
font-family:"Times New Roman",serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(-45deg,#ffecd2,#fcb69f,#a1c4fd,#c2e9fb);
background-size: 400% 400%;
animation: gradientBGbody 20s ease infinite;
overflow-y: auto;
overflow-x: hidden;
}

@keyframes gradientBGbody{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* PAPER / BOOK */
@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.paper{
width:820px;
background: var(--bg);
background-size: 400% 400%;
animation: gradientBG 12s ease infinite;
padding:40px 50px;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,0.35), inset 0 0 30px rgba(255,255,255,0.1);
color:var(--text);
transition:.3s;
position:relative;
overflow-y: auto;
max-height:90vh;
z-index:1;
}

/* subtle paper texture */
.paper::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
  border-radius:20px;
}

/* Progress bar */
.progress {
  height:10px;
  background:#eee;
  border-radius:5px;
  overflow:hidden;
  margin-bottom:20px;
}
.progress-fill {
  width:0%;
  height:100%;
  background: linear-gradient(to right, #4a6fa5, #6c8cd5);
  transition:width 0.4s;
}

/* Slide animation */
.slide {
  display:none;
  opacity:0;
  transform: translateY(20px);
  transition: all 0.5s ease;
}
.slide.active {
  display:block;
  opacity:1;
  transform: translateY(0);
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:10px 20px;
border:2px solid rgba(74, 111, 165, 0.5);
border-radius:25px;
cursor:pointer;
background: transparent;
color:rgba(74, 111, 165, 0.9);
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition: all 0.3s;
}

button:hover{
transform: scale(1.05);
opacity:0.9;
}

.question{
margin-bottom:18px;
padding-bottom:8px;
border-bottom:1px solid rgba(0,0,0,0.1);
}

.options label{
display:block;
padding:10px 15px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
transition: all 0.3s;
border:1px solid rgba(0,0,0,0.1);
}

.options label:hover{
background:var(--hover);
transform:scale(1.03);
}

.options input:checked + span{
background:var(--selected);
padding:6px 10px;
border-radius:6px;
border:1px solid #3a5a8f;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#result{
text-align:center;
font-size:20px;
}

/* PARTICLE CANVAS */
#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0; /* behind paper */
  pointer-events: none; /* clicks pass through */
}
</style>
</head>
<body>

<!-- Particle Canvas -->
<canvas id="bgCanvas"></canvas>

<div class="paper">
<div class="top-bar">
<button onclick="goBack()">⬅ Back</button>
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<h1 style="text-align:center;">Grammar Quiz</h1>

<!-- Progress bar -->
<div class="progress">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div id="quizSlides"></div>
<div id="result"></div>
</div>

<script>
// 40 TOTAL QUESTIONS
const questionBank = [
{q:"She ___ to school every day.",o:["go","going","goes","gone"],a:2},
{q:"They ___ playing soccer.",o:["is","are","was","be"],a:1},
{q:"He doesn't ___ coffee.",o:["like","likes","liked","liking"],a:0},
{q:"I have lived here ___ 2015.",o:["in","for","at","since"],a:3},
{q:"This is ___ orange.",o:["a","an","the","no article"],a:1},
{q:"We were tired ___ we continued.",o:["and","but","so","or"],a:1},
{q:"He is taller ___ me.",o:["that","then","than","as"],a:2},
{q:"The books ___ on the table.",o:["is","are","was","be"],a:1},
{q:"She sings ___.",o:["beautiful","beautifully","beauty","more beautiful"],a:1},
{q:"I have ___ friends.",o:["much","fewest","little","many"],a:3},
{q:"The dog wagged ___ tail.",o:["its","it's","it","it is"],a:0},
{q:"He said he ___ coming.",o:["is","be","were","was"],a:3},
{q:"The cake was ___ by Anna.",o:["bake","baked","baking","bakes"],a:1},
{q:"If I ___ you, I would study.",o:["am","was","were","be"],a:2},
{q:"She asked where I ___ from.",o:["am","was","were","be"],a:1},
{q:"He runs ___ than me.",o:["fast","more faster","fastest","faster"],a:3},
{q:"They stayed ___ two hours.",o:["since","for","at","by"],a:1},
{q:"Plural of child?",o:["childs","children","childes","child"],a:1},
{q:"We ___ finished.",o:["has","have","having","had"],a:1},
{q:"She ___ yesterday.",o:["write","writes","wrote","written"],a:2},
{q:"He ___ already eaten.",o:["has","have","had","having"],a:0},
{q:"There ___ many students.",o:["is","are","was","be"],a:1},
{q:"She is interested ___ music.",o:["in","on","at","by"],a:0},
{q:"The baby is ___ than before.",o:["happy","happier","happiest","more happy"],a:1},
{q:"I prefer tea ___ coffee.",o:["than","to","over","from"],a:1},
{q:"She can ___ the piano.",o:["plays","play","played","playing"],a:1},
{q:"He ___ TV now.",o:["watch","watches","is watching","watched"],a:2},
{q:"They have ___ homework.",o:["much","many","few","little"],a:0},
{q:"That is the ___ movie.",o:["bad","worse","worst","more bad"],a:2},
{q:"I will call you when I ___ home.",o:["get","gets","got","getting"],a:0},
{q:"She ___ to the market yesterday.",o:["go","goes","went","gone"],a:2},
{q:"This house is ___ than mine.",o:["big","bigger","biggest","more big"],a:1},
{q:"He speaks English very ___.",o:["good","well","better","best"],a:1},
{q:"She has ___ her project.",o:["finish","finished","finishing","finishes"],a:1},
{q:"We were late ___ the rain.",o:["because","because of","although","but"],a:1},
{q:"Neither John nor his friends ___ coming.",o:["is","are","was","be"],a:1},
{q:"She bought ___ umbrella.",o:["a","an","the","no article"],a:1},
{q:"He is afraid ___ spiders.",o:["of","from","with","at"],a:0},
{q:"She worked ___ than expected.",o:["hard","harder","hardest","more hard"],a:1},
{q:"I have never ___ to Japan.",o:["go","went","gone","going"],a:2}
];

// Shuffle helper
function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
shuffle(questionBank);
const selectedQuestions = questionBank.slice(0,20);

const slidesContainer=document.getElementById("quizSlides");
let currentSlide=0;
let score=0;

// Create slides (5 per slide)
for(let i=0;i<4;i++){
let slide=document.createElement("div");
slide.classList.add("slide");
if(i===0) slide.classList.add("active");
let slice=selectedQuestions.slice(i*5,(i+1)*5);
slice.forEach((item,index)=>{
slide.innerHTML+=`
<div class="question">
<p><strong>${i*5+index+1}. ${item.q}</strong></p>
<div class="options">
${item.o.map((opt,optIndex)=>`
<label>
<input type="radio" name="q${i*5+index}" value="${optIndex}">
<span>${opt}</span>
</label>
`).join("")}
</div>
</div>
`;
});
slidesContainer.appendChild(slide);
}

// Auto next
slidesContainer.addEventListener("change",function(){
let slide=document.querySelectorAll(".slide")[currentSlide];
let checked=slide.querySelectorAll("input[type=radio]:checked");
if(checked.length===5){setTimeout(()=>{nextSlide();},400);}
});

function nextSlide(){
let slides=document.querySelectorAll(".slide");
slides[currentSlide].classList.remove("active");
currentSlide++;
if(currentSlide<slides.length){
  slides[currentSlide].classList.add("active");
  document.querySelector(".paper").scrollTop = 0;
}else{calculateScore();}

// Update progress
document.getElementById("progressFill").style.width = ((currentSlide)/slides.length)*100 + "%";
}

function calculateScore(){
selectedQuestions.forEach((item,index)=>{
let selected=document.querySelector(`input[name="q${index}"]:checked`);
if(selected && parseInt(selected.value)===item.a){score++;}
});

let message="";
if(score<=9){message="Needs Improvement 📘";}
else if(score<=15){message="Good Job 👍";}
else{message="Excellent Work 🌟";}

document.getElementById("quizSlides").style.display="none";
document.getElementById("result").innerHTML=
`🎉 Quiz Finished! <br><br>
Your Score: <strong>${score}/20</strong><br><br>
Performance: <strong>${message}</strong><br><br>
<div style="display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-top:20px;">
<button onclick="goBack()" style="padding:12px 25px;background:linear-gradient(135deg,#6c8cd5,#4a6fa5);color:white;border:none;border-radius:25px;cursor:pointer;font-size:16px;font-weight:bold;">⬅ Back to Book</button>
<button onclick="goToNextQuiz()" style="padding:12px 25px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:25px;cursor:pointer;font-size:16px;font-weight:bold;">Next Quiz ➜</button>
</div>`;
}

function goToNextQuiz(){
  window.location.href="quiz-reading.html";
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
  const btn = document.querySelector('button[onclick="toggleDarkMode()"]');
  if(document.body.classList.contains("dark")){
    btn.textContent = "☀️ Light Mode";
  } else {
    btn.textContent = "🌙 Dark Mode";
  }
}
function goBack(){window.location.href="language.html";}

// PARTICLE BACKGROUND
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for(let i=0;i<80;i++){
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
radius: Math.random()*2+1,
speedX: (Math.random()-0.5)*0.5,
speedY: (Math.random()-0.5)*0.5,
alpha: Math.random()*0.5+0.2
});
}

function drawParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let p of particles){
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
ctx.fill();
p.x+=p.speedX;p.y+=p.speedY;
if(p.x>canvas.width)p.x=0;
if(p.x<0)p.x=canvas.width;
if(p.y>canvas.height)p.y=0;
if(p.y<0)p.y=canvas.height;
}
requestAnimationFrame(drawParticles);
}
drawParticles();

</script>
</body>
</html>
