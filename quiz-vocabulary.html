<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary Quiz</title>

<style>
:root{
--bg:linear-gradient(-45deg,#dfe9f3,#ffffff,#e3f2fd,#ffffff);
--paper:#fffef8;
--text:#222;
--hover:#f2f2f2;
--selected:#d6e4ff;
--btn:#4a6fa5;
--btn-text:#fff;
}

body.dark{
--bg:linear-gradient(-45deg,#1e1e1e,#2c2c2c,#1a1a1a,#2c2c2c);
--paper:#2f2f2f;
--text:#f5f5f5;
--hover:#3c3c3c;
--selected:#3a5a8f;
--btn:#6c8cd5;
--btn-text:#ffffff;
}

body{
margin:0;
font-family:"Times New Roman",serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background: linear-gradient(-45deg,#ffecd2,#fcb69f,#a1c4fd,#c2e9fb);
background-size: 400% 400%;
animation: gradientBGbody 20s ease infinite;
overflow-y: auto;
overflow-x: hidden;
}

@keyframes gradientBGbody{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.paper{
width:820px;
background: var(--bg);
background-size: 400% 400%;
animation: gradientBG 12s ease infinite;
padding:40px 50px;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,0.35), inset 0 0 30px rgba(255,255,255,0.1);
color:var(--text);
transition:.3s;
position:relative;
overflow-y: auto;
max-height:90vh;
z-index:1;
}

.paper::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
  border-radius:20px;
}

.progress {
  height:10px;
  background:#eee;
  border-radius:5px;
  overflow:hidden;
  margin-bottom:20px;
}
.progress-fill {
  width:0%;
  height:100%;
  background: linear-gradient(to right, #4a6fa5, #6c8cd5);
  transition:width 0.4s;
}

.slide {
  display:none;
  opacity:0;
  transform: translateY(20px);
  transition: all 0.5s ease;
}
.slide.active {
  display:block;
  opacity:1;
  transform: translateY(0);
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:10px 20px;
border:2px solid rgba(74, 111, 165, 0.5);
border-radius:25px;
cursor:pointer;
background: transparent;
color:rgba(74, 111, 165, 0.9);
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition: all 0.3s;
}

button:hover{
transform: scale(1.05);
opacity:0.9;
}

.question{
margin-bottom:18px;
padding-bottom:8px;
border-bottom:1px solid rgba(0,0,0,0.1);
}

.options label{
display:block;
padding:10px 15px;
margin:5px 0;
border-radius:8px;
cursor:pointer;
transition: all 0.3s;
border:1px solid rgba(0,0,0,0.1);
}

.options label:hover{
background:var(--hover);
transform:scale(1.03);
}

.options input:checked + span{
background:var(--selected);
padding:6px 10px;
border-radius:6px;
border:1px solid #3a5a8f;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#result{
text-align:center;
font-size:20px;
}

#bgCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="paper">
<div class="top-bar">
<button onclick="goBack()">⬅ Back</button>
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<h1 style="text-align:center;">English Vocabulary Quiz</h1>

<div class="progress">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div id="quizSlides"></div>
<div id="result"></div>
</div>

<script>
// Full 40-question Vocabulary Bank
const questionBank = [
{q:"What does 'abundant' mean?",o:["Scarce","Plentiful","Weak","Rare"],a:1},
{q:"Which word is a synonym of 'happy'?",o:["Sad","Joyful","Angry","Bored"],a:1},
{q:"What does 'benevolent' mean?",o:["Kind-hearted","Cruel","Lazy","Noisy"],a:0},
{q:"Which word is the antonym of 'ancient'?",o:["Old","Modern","Historic","Aged"],a:1},
{q:"What does 'gregarious' mean?",o:["Sociable","Shy","Hostile","Quiet"],a:0},
{q:"Which word means 'to shorten'?",o:["Expand","Abbreviate","Increase","Stretch"],a:1},
{q:"What is the meaning of 'meticulous'?",o:["Careful and precise","Careless","Quick","Messy"],a:0},
{q:"Choose the synonym of 'enormous'",o:["Tiny","Huge","Small","Little"],a:1},
{q:"What does 'elated' mean?",o:["Depressed","Excited","Thrilled","Sad"],a:2},
{q:"Which word is an antonym of 'scarce'?",o:["Rare","Plentiful","Limited","Few"],a:1},
{q:"What is the meaning of 'innovative'?",o:["Traditional","Creative","New ideas","Boring"],a:2},
{q:"Choose the synonym of 'frigid'",o:["Hot","Cold","Freezing","Warm"],a:2},
{q:"What does 'transient' mean?",o:["Temporary","Permanent","Long-lasting","Endless"],a:0},
{q:"Which word is an antonym of 'vivid'?",o:["Bright","Dull","Colorful","Clear"],a:1},
{q:"What does 'obscure' mean?",o:["Unknown or unclear","Famous","Bright","Popular"],a:0},
{q:"Choose the synonym of 'candid'",o:["Honest","Secretive","Dishonest","False"],a:0},
{q:"What does 'arbitrary' mean?",o:["Random","Planned","Fair","Certain"],a:0},
{q:"Which word means 'to encourage'?",o:["Dissuade","Motivate","Hinder","Prevent"],a:1},
{q:"What is the meaning of 'versatile'?",o:["Flexible or adaptable","Limited","Rigid","Boring"],a:0},
{q:"Which word is an antonym of 'timid'?",o:["Shy","Bold","Fearless","Cowardly"],a:1},
{q:"What does 'obstinate' mean?",o:["Stubborn","Flexible","Kind","Lazy"],a:0},
{q:"Which word is a synonym of 'brilliant'?",o:["Dull","Bright","Weak","Dark"],a:1},
{q:"What does 'lucid' mean?",o:["Clear","Confusing","Dark","Messy"],a:0},
{q:"Which word is the antonym of 'scarce'?",o:["Abundant","Rare","Few","Limited"],a:0},
{q:"What does 'elusive' mean?",o:["Hard to catch","Easy","Simple","Famous"],a:0},
{q:"Which word means 'to forgive'?",o:["Punish","Condone","Reprimand","Ignore"],a:1},
{q:"What is the meaning of 'prudent'?",o:["Careful","Reckless","Lazy","Bold"],a:0},
{q:"Choose the synonym of 'diminish'",o:["Decrease","Increase","Grow","Expand"],a:0},
{q:"What does 'revere' mean?",o:["Respect","Hate","Ignore","Annoy"],a:0},
{q:"Which word is an antonym of 'generous'?",o:["Selfish","Kind","Helpful","Giving"],a:0},
{q:"What does 'futile' mean?",o:["Useless","Helpful","Important","Successful"],a:0},
{q:"Choose the synonym of 'arduous'",o:["Easy","Difficult","Simple","Quick"],a:1},
{q:"What does 'copious' mean?",o:["Plentiful","Few","Rare","Limited"],a:0},
{q:"Which word is the antonym of 'opaque'?",o:["Transparent","Dark","Dull","Murky"],a:0},
{q:"What does 'benevolent' mean?",o:["Kind","Cruel","Mean","Lazy"],a:0},
{q:"Choose the synonym of 'venerate'",o:["Honor","Disrespect","Ignore","Criticize"],a:0},
{q:"Which word is the antonym of 'temporary'?",o:["Permanent","Brief","Short-lived","Fleeting"],a:0},
{q:"What does 'ambiguous' mean?",o:["Unclear","Clear","Obvious","Precise"],a:0},
{q:"Choose the synonym of 'innovative'",o:["Creative","Ordinary","Traditional","Boring"],a:0},
{q:"Which word is an antonym of 'hostile'?",o:["Friendly","Aggressive","Mean","Rude"],a:0}
];

// Shuffle and select 20 questions randomly for each quiz
function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
shuffle(questionBank);
const selectedQuestions = questionBank.slice(0,20);

const slidesContainer=document.getElementById("quizSlides");
let currentSlide=0;
let score=0;

// Create slides 5 questions per slide
for(let i=0;i<4;i++){
let slide=document.createElement("div");
slide.classList.add("slide");
if(i===0) slide.classList.add("active");
let slice=selectedQuestions.slice(i*5,(i+1)*5);
slice.forEach((item,index)=>{
slide.innerHTML+=`
<div class="question">
<p><strong>${i*5+index+1}. ${item.q}</strong></p>
<div class="options">
${item.o.map((opt,optIndex)=>`
<label>
<input type="radio" name="q${i*5+index}" value="${optIndex}">
<span>${opt}</span>
</label>
`).join("")}
</div>
</div>
`;
});
slidesContainer.appendChild(slide);
}

// Auto next slide
slidesContainer.addEventListener("change",function(){
let slide=document.querySelectorAll(".slide")[currentSlide];
let checked=slide.querySelectorAll("input[type=radio]:checked");
if(checked.length===5){setTimeout(()=>{nextSlide();},400);}
});

function nextSlide(){
let slides=document.querySelectorAll(".slide");
slides[currentSlide].classList.remove("active");
currentSlide++;
if(currentSlide<slides.length){
  slides[currentSlide].classList.add("active");
  document.querySelector(".paper").scrollTop = 0;
}else{calculateScore();}
document.getElementById("progressFill").style.width = ((currentSlide)/slides.length)*100 + "%";
}

function calculateScore(){
selectedQuestions.forEach((item,index)=>{
let selected=document.querySelector(`input[name="q${index}"]:checked`);
if(selected && parseInt(selected.value)===item.a){score++;}
});
let message="";
if(score<=9){message="Needs Improvement 📘";}
else if(score<=15){message="Good Job 👍";}
else{message="Excellent Work 🌟";}

document.getElementById("quizSlides").style.display="none";
document.getElementById("result").innerHTML=
`🎉 Quiz Finished! <br><br>
Your Score: <strong>${score}/20</strong><br><br>
Performance: <strong>${message}</strong><br><br>
<button onclick="goToNextQuiz()" style="padding:12px 25px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:25px;cursor:pointer;font-size:16px;font-weight:bold;margin-top:20px;">Next: Literature Quiz ➜</button>`;
}

function goToNextQuiz(){
  window.location.href="quiz-literature.html";
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
  const btn = document.querySelector('button[onclick="toggleDarkMode()"]');
  if(document.body.classList.contains("dark")){
    btn.textContent = "☀️ Light Mode";
  } else {
    btn.textContent = "🌙 Dark Mode";
  }
}
function goBack(){window.location.href="language.html";}

// Particle Background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
for(let i=0;i<80;i++){
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
radius: Math.random()*2+1,
speedX: (Math.random()-0.5)*0.5,
speedY: (Math.random()-0.5)*0.5,
alpha: Math.random()*0.5+0.2
});
}
function drawParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let p of particles){
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
ctx.fill();
p.x+=p.speedX;p.y+=p.speedY;
if(p.x>canvas.width)p.x=0;
if(p.x<0)p.x=canvas.width;
if(p.y>canvas.height)p.y=0;
if(p.y<0)p.y=canvas.height;
}
requestAnimationFrame(drawParticles);
}
drawParticles();
</script>
</body>
</html>
