<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Virtual Builder – System Unit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:"Segoe UI", sans-serif; }

body {
  min-height:100vh;
  background: url("Background.png") no-repeat center center fixed;
  background-size: cover;
}

.wrapper { display:flex; height:100vh; background: rgba(0,0,0,0.25); }

/* LEFT PANEL */
.parts-panel {
  width:22%;
  min-width:220px;
  background: rgba(255,255,255,0.15);
  padding:20px;
  backdrop-filter: blur(6px);
  overflow-y:auto;
}
.parts-panel h2 {
  color:#fff;
  text-align:center;
  margin-bottom:15px;
  font-size:1.3rem;
}

.part {
  background: rgba(0,0,0,0.5);
  padding:10px;
  border-radius:12px;
  margin-bottom:12px;
  text-align:center;
  cursor:grab;
}
.part img {
  width:70px;
  pointer-events:none;
}

/* RIGHT PANEL */
.system-panel {
  flex:1;
  padding:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.system-panel h1 { color:#fff; margin-bottom:15px; }

/* SYSTEM UNIT */
.system-unit {
  width:95%;
  max-width:950px;
  height:620px;
  background: rgba(255,255,255,0.12);
  border-radius:25px;
  padding:20px;
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap:12px;
  border:3px dashed rgba(255,255,255,0.7);
}

/* FIXED MOTHERBOARD */
.motherboard {
  grid-column:1 / 5;
  grid-row:1 / 5;
  background: url("motherboard.png") center/contain no-repeat rgba(0,123,255,0.25);
  border-radius:15px;
  display:grid;
  grid-template-columns: repeat(4,1fr);
  grid-template-rows: repeat(4,1fr);
  gap:6px;
  padding:10px;
}

/* SLOTS */
.slot {
  display:flex;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.4);
  border:2px dashed rgba(255,255,255,0.5);
  border-radius:12px;
}
.slot img {
  width:60px;
}

/* SLOT POSITIONS */
.slot[data-slot="cpu"] { grid-column:2; grid-row:1; }
.slot[data-slot="ram"] { grid-column:3; grid-row:1; }
.slot[data-slot="cooling"] { grid-column:2; grid-row:2; }
.slot[data-slot="gpu"] { grid-column:2 / 4; grid-row:3; }
.slot[data-slot="expansion"] { grid-column:4; grid-row:3; }

.slot[data-slot="storage"] { grid-column:5; grid-row:1 / 3; }
.slot[data-slot="psu"] { grid-column:5; grid-row:4 / 6; }

/* BUTTON */
.reset-btn {
  margin-top:15px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  font-size:1rem;
  background: linear-gradient(135deg,#ff6b6b,#f59e0b);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="wrapper">

<!-- LEFT PANEL -->
<div class="parts-panel">
  <h2>System Unit Parts</h2>

  <div class="part" draggable="true" data-part="cpu" data-img="cpu.png">
    <img src="cpu.png">
  </div>

  <div class="part" draggable="true" data-part="ram" data-img="ram.png">
    <img src="ram.png">
  </div>

  <div class="part" draggable="true" data-part="gpu" data-img="gpu.png">
    <img src="gpu.png">
  </div>

  <div class="part" draggable="true" data-part="storage" data-img="storage.png">
    <img src="storage.png">
  </div>

  <div class="part" draggable="true" data-part="psu" data-img="psu.png">
    <img src="psu.png">
  </div>

  <div class="part" draggable="true" data-part="cooling" data-img="cooling.png">
    <img src="cooling.png">
  </div>

  <div class="part" draggable="true" data-part="expansion" data-img="expansion.png">
    <img src="expansion.png">
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="system-panel">
  <h1>System Unit</h1>

  <div class="system-unit">

    <!-- FIXED MOTHERBOARD -->
    <div class="motherboard">
      <div class="slot" data-slot="cpu"></div>
      <div class="slot" data-slot="ram"></div>
      <div class="slot" data-slot="cooling"></div>
      <div class="slot" data-slot="gpu"></div>
      <div class="slot" data-slot="expansion"></div>
    </div>

    <div class="slot" data-slot="storage"></div>
    <div class="slot" data-slot="psu"></div>

  </div>

  <button class="reset-btn">Reset System Unit</button>
</div>

</div>

<script>
const parts = document.querySelectorAll(".part");
const slots = document.querySelectorAll(".slot");

parts.forEach(part => {
  part.addEventListener("dragstart", e => {
    e.dataTransfer.setData("part", part.dataset.part);
    e.dataTransfer.setData("img", part.dataset.img);
  });
});

slots.forEach(slot => {
  slot.addEventListener("dragover", e => e.preventDefault());
  slot.addEventListener("drop", e => {
    e.preventDefault();
    if (slot.children.length > 0) return;

    const part = e.dataTransfer.getData("part");
    const imgSrc = e.dataTransfer.getData("img");

    if (slot.dataset.slot === part) {
      const img = document.createElement("img");
      img.src = imgSrc;
      slot.appendChild(img);
    }
  });
});

document.querySelector(".reset-btn").addEventListener("click", () => {
  slots.forEach(slot => slot.innerHTML = "");
});
</script>

</body>
</html>
