<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospecture Login</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fredoka', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("Background2.png") no-repeat center center/cover;
      overflow: hidden;
    }

    @keyframes flowOut {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(80px); opacity: 0; }
    }

    body.flow-out .right,
    body.flow-out .left {
      animation: flowOut 0.6s ease forwards;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 40px;
      width: 90%;
      max-width: 1200px;
    }

    .left {
      flex: 1;
      min-width: 300px;
      text-align: center;
      color: white;
    }

    .left h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.2;
    }

    .left h2 {
      margin-top: 10px;
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 500;
    }

    .career-icon {
      margin-top: 25px;
      max-width: 450px;
      width: 75%;
    }

    .right {
      flex: 1;
      min-width: 320px;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      color: #2c2c54;
      opacity: 0;
      transform: translateY(50px);
      animation: floatIn 0.8s ease-out forwards;
    }

    @keyframes floatIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .right h3 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .right p {
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #444;
    }

    .input-box {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background: rgba(0, 150, 255, 0.1);
    }

    .forgot {
      display: block;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #2c2c54;
      text-decoration: none;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #1d1f5c;
      color: white;
      margin-bottom: 20px;
      transition: 0.3s ease;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      font-size: 0.85rem;
      color: #666;
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      gap: 10px;
      transition: 0.3s ease;
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .btn-google:hover {
      background: #f5f5f5;
    }

    .error-message {
      color: red;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 20px;
      display: none;
    }

    /* Responsive Styles */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        gap: 30px;
        padding: 20px;
      }
      
      .left {
        min-width: 100%;
        padding: 20px;
      }
      
      .left h1 {
        font-size: 2.5rem;
      }
      
      .left h2 {
        font-size: 1.2rem;
      }
      
      .career-icon {
        max-width: 300px;
      }
      
      .right {
        min-width: 100%;
        max-width: 100%;
        padding: 25px;
      }
    }

    @media (max-width: 480px) {
      .container {
        gap: 20px;
        padding: 15px;
      }
      
      .left h1 {
        font-size: 2rem;
      }
      
      .left h2 {
        font-size: 1rem;
      }
      
      .career-icon {
        max-width: 200px;
        margin-top: 15px;
      }
      
      .right {
        padding: 20px;
        border-radius: 15px;
      }
      
      .right h3 {
        font-size: 1.4rem;
      }
      
      .input-box {
        padding: 12px;
        font-size: 0.9rem;
      }
      
      .btn-primary {
        padding: 12px;
        font-size: 0.9rem;
      }
      
      .btn-google {
        padding: 10px;
        font-size: 0.9rem;
      }
    }
  </style>

  <script>
    let transitionToPage;

    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");
      const googleBtn = document.querySelector(".btn-google");
      const errorBox = document.querySelector(".error-message");

      transitionToPage = (target) => {
        document.body.classList.add("flow-out");
        setTimeout(() => {
          window.location.href = target;
        }, 600);
      };

      // Regular login
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.style.display = "none";

        const email = form.querySelector('input[type="email"]').value;
        const password = form.querySelector('input[type="password"]').value;

        try {
          const res = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (res.ok) {
            localStorage.setItem("token", data.token);
            transitionToPage("Homepage.html");
          } else {
            errorBox.textContent = data.error || "Login failed";
            errorBox.style.display = "block";
          }
        } catch (err) {
          errorBox.textContent = "Network error. Try again later.";
          errorBox.style.display = "block";
        }
      });

      // Google login
      window.onload = function() {
        google.accounts.id.initialize({
          client_id: "YOUR_CLIENT_ID.apps.googleusercontent.com",
          callback: handleGoogleResponse,
        });

        // No automatic render to keep custom UI
      };

      googleBtn.addEventListener("click", () => {
        google.accounts.id.prompt(); // opens the Google popup
      });

      async function handleGoogleResponse(response) {
        try {
          const res = await fetch("http://localhost:5000/api/auth/google", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idToken: response.credential }),
          });

          const data = await res.json();

          if (res.ok) {
            localStorage.setItem("token", data.user.token);
            transitionToPage("Homepage.html");
          } else {
            errorBox.textContent = data.error || "Google login failed";
            errorBox.style.display = "block";
          }
        } catch (err) {
          errorBox.textContent = "Error contacting server.";
          errorBox.style.display = "block";
        }
      }
    });
  </script>
</head>

<body>
  <div class="overlay"></div>
  <div class="container">
    <div class="left">
      <h1>WELCOME<br>TO PROSPECTURE</h1>
      <h2>Uncertain Future Career</h2>
      <img src="career-icon.png" alt="Career Choice Icon" class="career-icon" />
    </div>

    <div class="right">
      <h3>Let’s sign you In.</h3>
      <p>Hello, welcome to Prospecture</p>

      <div class="error-message" id="errorBox">Error message here</div>

      <form id="loginForm">
        <input type="email" placeholder="Email" class="input-box" required />
        <input type="password" placeholder="Password" class="input-box" required />
        <a href="#" class="forgot">Forget password?</a>
        <button type="submit" class="btn-primary">Sign in now</button>
      </form>

      <div class="divider">or sign in with Google</div>
      <button class="btn-google">
        <img src="google-icon.png" alt="Google Logo" /> Google
      </button>
    </div>
  </div>
</body>
</html>
